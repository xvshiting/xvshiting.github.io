title: "Xu Shiting | 许士亭"
description: "Personal homepage - NLP, Deep Learning, Data Mining"
url: "https://xvshiting.github.io"
baseurl: ""
logo: /assets/image/CV/cv5.png
social:
  name: Xu Shiting
  links:
    - https://github.com/xvshiting
    - https://twitter.com/xvshiting1
    - https://www.linkedin.com/in/士亭-许-618191107

collections:
  authors:
    output: true
  projects:
    output: true
  research:
    output: true

defaults:
  - scope:
      path: ""
      type: "authors"
    values:
      layout: "author"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      image: /assets/image/CV/cv5.png
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project-detail"
  - scope:
      path: ""
      type: "research"
    values:
      layout: "research-detail"
  - scope:
      path: ""
    values:
      layout: "default"

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

google_site_verification: # paste your verification code here from Google Search Console

highlighter: rouge
markdown: kramdown
kramdown:
  input: GFM

feed:
  path: /feed.xml

exclude:
  - newpost.sh
  - update_bio.sh
  - publish.sh
  - Gemfile
  - Gemfile.lock
  - README.md

# Navigation
nav:
  - name: Home
    link: /
    icon: fa-home
  - name: Blog
    link: /blog.html
    icon: fa-book
  - name: Tags
    link: /mytags.html
    icon: fa-tags
  - name: Research
    link: /research.html
    icon: fa-flask
  - name: Projects
    link: /projects.html
    icon: fa-code
  - name: Series
    link: /series.html
    icon: fa-book
  - name: Search
    link: /search.html
    icon: fa-search
  - name: About
    link: /about.html
    icon: fa-user

# Author info (used across the site)
author:
  name: "S. Xu (许士亭)"
  name_en: "S. Xu"
  email: xvshiting-at-live-dot-com
  github: xvshiting
  twitter: xvshiting1
  linkedin: "士亭-许-618191107"
  position: "Lecturer"
  department: "Department of Cyberspace Security"
  university: "Shandong University of Political Science and Law"
  avatar: /assets/image/CV/cv5.jpg
  cv: /assets/pdf/willXu_cv.pdf
  interests:
    - Machine Learning
    - NLP
    - Deep Learning
    - Data Mining