<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
    <meta name="author" content="{{ site.author.name }}">
    <link rel="canonical" href="{{ page.url | absolute_url }}">
    <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
    <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
    <meta property="og:description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta property="og:image" content="{% if page.image %}{{ page.image | absolute_url }}{% else %}{{ site.logo | absolute_url }}{% endif %}">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:creator" content="@{{ site.author.twitter }}">
    <link rel="alternate" type="application/rss+xml" title="{{ site.title }} - RSS Feed" href="/feed.xml">
    <link rel="stylesheet" href="/assets/css/styles.css">
    <link rel="stylesheet" href="/assets/css/rouge.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
    {% feed_meta %}
    {% seo %}
    <script type="text/x-mathjax-config">
      MathJax.Hub.Config({
        tex2jax: {
          skipTags: ['script', 'noscript', 'style', 'textarea', 'pre'],
          inlineMath: [['$','$']]
        }
      });
    </script>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/latest.js?config=TeX-MML-AM_CHTML' async></script>
  </head>
  <body>
    <button class="menu-toggle" aria-label="Menu">☰</button>
    <button class="sidebar-show" aria-label="Show sidebar" title="Show sidebar">≡</button>
    <div class="layout">
      {% include navigation.html %}
      <main class="content">
        {{ content }}
      </main>
    </div>
    <footer class="site-footer">
      <p>&copy; {{ 'now' | date: "%Y" }} {{ site.author.name }}. Powered by Jekyll.</p>
    </footer>

    <script>
      var sidebar = document.querySelector('.sidebar');
      var content = document.querySelector('.content');
      var footer = document.querySelector('.site-footer');
      var showBtn = document.querySelector('.sidebar-show');

      function hideSidebar() {
        sidebar.classList.add('hidden');
        content.classList.add('full');
        footer.classList.add('full');
        showBtn.classList.add('visible');
      }

      function showSidebar() {
        sidebar.classList.remove('hidden');
        content.classList.remove('full');
        footer.classList.remove('full');
        showBtn.classList.remove('visible');
      }

      document.querySelector('.menu-toggle')?.addEventListener('click', function() {
        if (window.innerWidth <= 768) {
          sidebar.classList.toggle('open');
        } else {
          if (sidebar.classList.contains('hidden')) {
            showSidebar();
          } else {
            hideSidebar();
          }
        }
      });

      document.querySelector('.sidebar-close')?.addEventListener('click', function() {
        if (window.innerWidth <= 768) {
          sidebar.classList.remove('open');
        } else {
          hideSidebar();
        }
      });

      showBtn?.addEventListener('click', function() {
        showSidebar();
      });
    </script>
  </body>
</html>
